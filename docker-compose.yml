# MD-Beautify · Docker Compose 编排
# 一键启动完整应用：后端 API + 前端 (nginx 反代)
#
# 用法:
#   docker compose up -d --build       # 后台启动并构建
#   docker compose logs -f             # 查看日志
#   docker compose down                # 停止
#   docker compose down -v             # 停止并删除数据卷

version: '3.8'

services:
  # ---------------- 后端 API 服务 ----------------
  backend:
    image: registry.cn-hangzhou.aliyuncs.com/tzzjchao/markdown-beatify-backend:latest
    container_name: md-beautify-backend
    restart: unless-stopped
    ports:
      - "5012:7001"
    environment:
      - NODE_ENV=production
      - PORT=7001
      - HOST=0.0.0.0
    volumes:
      # 持久化数据（Markdown 文件 + 元数据）
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7001/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - md-beautify-net

# ---------------- 网络 ----------------
networks:
  md-beautify-net:
